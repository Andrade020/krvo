<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="crow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d3a"/>
      <stop offset="100%" style="stop-color:#1a1a24"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  
  <!-- Corvo simplificado -->
  <g transform="translate(8, 12)">
    <!-- Corpo -->
    <ellipse cx="20" cy="28" rx="16" ry="14" fill="url(#crow)"/>
    
    <!-- Cabeça -->
    <circle cx="32" cy="18" r="10" fill="url(#crow)"/>
    
    <!-- Bico -->
    <path d="M40 16 L52 18 L40 20 Z" fill="#1a1a24"/>
    
    <!-- Olho -->
    <circle cx="35" cy="16" r="3" fill="#e94560"/>
    <circle cx="36" cy="15" r="1" fill="#fff"/>
    
    <!-- Asa -->
    <path d="M8 24 Q2 18 6 12 Q10 18 14 22 Z" fill="url(#crow)"/>
    
    <!-- Cauda -->
    <path d="M6 34 L2 44 L8 40 L6 48 L12 42 L14 38 Z" fill="url(#crow)"/>
  </g>
  
  <!-- Mini envelope -->
  <g transform="translate(44, 22) rotate(-10)">
    <rect width="14" height="10" rx="1" fill="#f4e4c1" stroke="#c9b896" stroke-width="0.5"/>
    <path d="M0 0 L7 5 L14 0" fill="none" stroke="#c9b896" stroke-width="0.5"/>
  </g>
</svg>
